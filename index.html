<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexxa Metais - Mapeamento de Similares</title>
    <style>
        /* Estilos Gerais (Foco em Performance Mobile) */
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 10px; color: #333; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        h1 { color: #111; text-align: center; margin: 10px 0 5px 0; font-size: 22px; font-weight: 600; }
        .subtitle { text-align: center; color: #666; margin-bottom: 20px; font-size: 13px; padding: 0 10px; }
        
        /* Campo de Busca Otimizado para Dedos */
        .search-box { display: flex; margin-bottom: 20px; }
        input { flex: 1; padding: 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; transition: border 0.2s; -webkit-appearance: none; }
        input:focus { border-color: #bba15c; box-shadow: 0 0 0 2px rgba(187, 161, 92, 0.2); }
        
        .grid-resultados { display: grid; gap: 20px; }
        
        /* Layout Mestre Adaptável (Flex-direction muda no Mobile) */
        .card-mapeamento { border: 1px solid #e0e0e0; border-radius: 8px; background: #fafafa; display: flex; flex-direction: row; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        
        /* Bloco Esquerdo: Produto Lexxa */
        .bloco-lexxa { flex: 0 0 260px; background: #fffdf2; border-right: 2px dashed #eadeb8; padding: 20px; display: flex; flex-direction: column; align-items: center; text-align: center; justify-content: center; }
        
        /* Bloco Direito: Grid de Concorrentes */
        .grid-concorrentes { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; padding: 15px; background: white; align-items: start; }
        
        /* Cards Individuais de Produtos */
        .item-produto { display: flex; flex-direction: column; align-items: center; text-align: center; background: #fafafa; border: 1px solid #eee; border-radius: 6px; padding: 10px; }
        
        /* Ajuste Fino das Imagens para nunca estourarem a tela */
        .foto-container { width: 110px; height: 110px; display: flex; align-items: center; justify-content: center; background: white; border: 1px solid #eee; border-radius: 6px; margin: 8px 0; padding: 5px; }
        .foto-produto { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* Badges Identificadoras */
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; background: #e0e0e0; color: #444; }
        .badge.lexxa { background: #bba15c; color: white; font-size: 11px; }
        
        h3 { margin: 6px 0 2px 0; font-size: 14px; color: #222; }
        .sem-foto { font-size: 11px; color: #aaa; text-align: center; font-style: italic; }

        /* ==========================================================================
           REGRAS DE OURO PARA CELULAR (MEDIA QUERY MOBILE)
           ========================================================================== */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 12px; }
            h1 { font-size: 19px; }
            
            /* Transforma o layout em uma coluna vertical e remove a borda lateral */
            .card-mapeamento { flex-direction: column; }
            .bloco-lexxa { flex: none; border-right: none; border-bottom: 2px dashed #eadeb8; padding: 15px; }
            
            /* Força os concorrentes a ficarem organizados em 2 colunas no celular para poupar espaço */
            .grid-concorrentes { grid-template-columns: repeat(2, 1fr); padding: 10px; gap: 8px; }
            .foto-container { width: 95px; height: 95px; }
            h3 { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Mapeamento de Similares</h1>
    <div class="subtitle">LEXXA</div>
    
    <div class="search-box">
        <input type="text" id="busca" placeholder="Busque por produto ou marca (Ex: Harco, Frame, Laris, Deca, Docol...)" oninput="buscarSimilar()">
    </div>

    <div id="resultados" class="grid-resultados">
        </div>
</div>

<script>
// Banco de dados idêntico à planilha oficial com imagens em MAIÚSCULO
const baseSimilares = [
    {
        lexxa_nome: "ARTICO",
        lexxa_img: "ARTICO.jpg",
        concorrentes: [
            { marca: "DOCOL", codigo: "ORBIT", img: "ORBIT.jpg" }
        ]
    },
    {
        lexxa_nome: "HARCO",
        lexxa_img: "HARCO.jpg", 
        concorrentes: [
            { marca: "DECA", codigo: "URBAN", img: "URBAN.jpg" },
            { marca: "DECA", codigo: "2280C", img: "2280C.jpg" },
            { marca: "DOCOL", codigo: "DOC", img: "DOC.jpg" },
            { marca: "RUBINETTOS", codigo: "RB3362", img: "RB3362.jpg" },
            { marca: "RUBINETTOS", codigo: "RB3396", img: "RB3396.jpg" },
            { marca: "DOKA", codigo: "AEREA", img: "AEREA.jpg" }
        ]
    },
    {
        lexxa_nome: "BOOL",
        lexxa_img: "BOOL.jpg",
        concorrentes: [
            { marca: "DECA", codigo: "SPIN", img: "SPIN.jpg" },
            { marca: "DOCOL", codigo: "MANGIARE", img: "MAGIARE.jpg" },
            { marca: "DOKA", codigo: "FERME", img: "FERME.jpg" }
        ]
    },
    {
        lexxa_nome: "FRAME",
        lexxa_img: "FRAME.jpg",
        concorrentes: [
            { marca: "DECA", codigo: "LEVEL", img: "LEVEL.jpg" },
            { marca: "DOCOL", codigo: "LIFT", img: "LIFT.jpg" },
            { marca: "RUBINETTOS", codigo: "RB3401", img: "RB3401.jpg" },
            { marca: "DOKA", codigo: "NEORA", img: "NEORA.jpg" }
        ]
    },
    {
        lexxa_nome: "REEL",
        lexxa_img: "REEL.jpg",
        concorrentes: [
            { marca: "DECA", codigo: "SPIN", img: "SPIN.jpg" },
            { marca: "DOCOL", codigo: "BOLD", img: "BOLD.jpg" }
        ]
    },
    {
        lexxa_nome: "QUARK",
        lexxa_img: "QUARK.jpg",
        concorrentes: [
            { marca: "DECA", codigo: "SPIN", img: "SPIN.jpg" },
            { marca: "DOCOL", codigo: "CHOICE", img: "CHOICE.jpg" },
            { marca: "RUBINETTOS", codigo: "RB3150", img: "RB3150.jpg" }
        ]
    },
    {
        lexxa_nome: "CONIQ",
        lexxa_img: "CONIQ.jpg",
        concorrentes: [
            { marca: "DECA", codigo: "LEVEL GOURMET", img: "LEVEL GOURMET.jpg" },
            { marca: "DOCOL", codigo: "DOC", img: "DOC.jpg" },
            { marca: "RUBINETTOS", codigo: "RB3396", img: "RB3396.jpg" },
            { marca: "DOKA", codigo: "AEREA", img: "AEREA.jpg" }
        ]
    },
    {
        lexxa_nome: "LARIS",
        lexxa_img: "LARIS.jpg",
        concorrentes: [
            { marca: "DECA", codigo: "DECA YOU", img: "DECA YOU.jpg" },
            { marca: "DOCOL", codigo: "MIX & MATCH", img: "MIX & MATCH.jpg" },
            { marca: "RUBINETTOS", codigo: "RB33865", img: "RB33865.jpg" },
            { marca: "DOKA", codigo: "MODU", img: "MODU.jpg" }
        ]
    }
];

function buscarSimilar() {
    const termo = document.getElementById('busca').value.toLowerCase().trim();
    const container = document.getElementById('resultados');
    container.innerHTML = '';

    if (termo === '') return;

    const filtrados = baseSimilares.filter(item => {
        const bateLexxa = item.lexxa_nome.toLowerCase().includes(termo);
        const bateConcorrente = item.concorrentes.some(c => 
            c.marca.toLowerCase().includes(termo) || 
            c.codigo.toLowerCase().includes(termo)
        );
        return bateLexxa || bateConcorrente || termo === 'lexxa';
    });

    if (filtrados.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:#777; font-size: 14px;">Nenhum produto correspondente encontrado.</p>';
        return;
    }

    filtrados.forEach(item => {
        const cardMestre = document.createElement('div');
        cardMestre.className = 'card-mapeamento';
        
        const imgLexxa = item.lexxa_img 
            ? `<img class="foto-produto" src="${item.lexxa_img}" alt="${item.lexxa_nome}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">` 
            : '';
        
        let htmlLexxa = `
            <div class="bloco-lexxa">
                <span class="badge lexxa">LEXXA</span>
                <div class="foto-container">
                    ${imgLexxa}
                    <div class="sem-foto" style="${item.lexxa_img ? 'display:none;' : ''}">Sem Imagem</div>
                </div>
                <h3>${item.lexxa_nome}</h3>
            </div>
        `;

        let htmlConcorrentes = `<div class="grid-concorrentes">`;
        
        item.concorrentes.forEach(c => {
            const imgC = c.img 
                ? `<img class="foto-produto" src="${c.img}" alt="${c.codigo}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">` 
                : '';
                
            htmlConcorrentes += `
                <div class="item-produto">
                    <span class="badge">${c.marca}</span>
                    <div class="foto-container">
                        ${imgC}
                        <div class="sem-foto" style="${c.img ? 'display:none;' : ''}">Imagem não<br>cadastrada</div>
                    </div>
                    <h3>${c.codigo}</h3>
                </div>
            `;
        });
        
        htmlConcorrentes += `</div>`;

        cardMestre.innerHTML = htmlLexxa + htmlConcorrentes;
        container.appendChild(cardMestre);
    });
}
</script>

</body>
</html>
